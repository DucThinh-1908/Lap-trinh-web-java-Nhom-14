<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CinemaVN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: white; }
        header {
            background: #111; padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #2ecc71;
        }
        .logo { font-size: 22px; font-weight: bold; color: #2ecc71; }
        header nav a { color: white; text-decoration: none; margin-left: 25px; }
        header nav a:hover { color: #2ecc71; }
        main { padding: 30px 40px; }
        footer {
            background: #111; text-align: center; padding: 20px;
            border-top: 3px solid #2ecc71; color: #aaa; font-size: 14px;
        }
    </style>
</head>
<body>
<header th:fragment="header">
    <div class="logo">🎬 CinemaVN</div>
    <nav>
        <a th:href="@{/}">Trang Chủ</a>
        <a th:href="@{/movies}">Phim</a>
        <a th:href="@{/booking}">Đặt Vé</a>
    </nav>
</header>
<footer th:fragment="footer">
    <p>© 2026 CinemaVN - Website Bán Vé Xem Phim</p>
    <p>Hotline: 1900-xxxx | Email: support@cinemavn.com</p>
</footer>
</body>
</html>
