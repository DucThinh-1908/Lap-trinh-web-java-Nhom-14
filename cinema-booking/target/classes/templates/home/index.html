<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}">Home</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        .header {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-top: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn {
            display: inline-block;
            padding: 10px 15px;
            background: #e50914;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: darkred;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎬 Cinema Booking System</h1>
</div>

<div class="container">

    <div class="card">
        <h2 th:text="${welcomeMessage}"></h2>
        <p>Hệ thống đặt vé xem phim online dành cho khách hàng và admin.</p>

        <a href="/movies" class="btn">Xem danh sách phim</a>
    </div>

    <div class="card">
        <h3>Chức năng chính</h3>
        <ul>
            <li>Xem danh sách phim</li>
            <li>Đặt vé xem phim</li>
            <li>Thanh toán</li>
            <li>Quản lý tài khoản</li>
        </ul>
    </div>

</div>

</body>
</html>
