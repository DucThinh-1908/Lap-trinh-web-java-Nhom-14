<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thống kê doanh thu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .summary-card { border-left: 4px solid; border-radius: 8px; }
        .card-revenue { border-left-color: #198754; }
        .card-bookings { border-left-color: #0d6efd; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid py-4">

    <!-- Tiêu đề -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">📊 Thống kê doanh thu</h4>
    </div>

    <!-- Bộ lọc -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/admin/revenue}" method="get" class="row g-3 align-items-end">

                <!-- Loại thống kê -->
                <div class="col-md-2">
                    <label class="form-label fw-semibold">Loại</label>
                    <select name="type" class="form-select" onchange="this.form.submit()">
                        <option value="day"   th:selected="${type == 'day'}">Theo ngày</option>
                        <option value="month" th:selected="${type == 'month'}">Theo tháng</option>
                    </select>
                </div>

                <!-- Theo ngày: chọn từ - đến -->
                <div th:if="${type == 'day'}" class="col-md-2">
                    <label class="form-label fw-semibold">Từ ngày</label>
                    <input type="date" name="from" class="form-control"
                           th:value="${#temporals.format(from, 'yyyy-MM-dd')}">
                </div>
                <div th:if="${type == 'day'}" class="col-md-2">
                    <label class="form-label fw-semibold">Đến ngày</label>
                    <input type="date" name="to" class="form-control"
                           th:value="${#temporals.format(to, 'yyyy-MM-dd')}">
                </div>

                <!-- Theo tháng: chọn năm -->
                <div th:if="${type == 'month'}" class="col-md-2">
                    <label class="form-label fw-semibold">Năm</label>
                    <input type="number" name="year" class="form-control"
                           th:value="${year}" min="2020" max="2099">
                </div>

                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Xem báo cáo</button>
                </div>

            </form>
        </div>
    </div>

    <!-- Summary cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm summary-card card-revenue p-3">
                <div class="text-muted small">Tổng doanh thu</div>
                <div class="fs-4 fw-bold text-success"
                     th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm summary-card card-bookings p-3">
                <div class="text-muted small">Tổng số đơn</div>
                <div class="fs-4 fw-bold text-primary" th:text="${totalBookings} + ' đơn'"></div>
            </div>
        </div>
    </div>

    <!-- Biểu đồ -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <canvas id="revenueChart" height="80"></canvas>
        </div>
    </div>

    <!-- Bảng dữ liệu -->
    <div class="card shadow-sm">
        <div class="card-header fw-semibold">Chi tiết</div>
        <div class="card-body p-0">
            <table class="table table-hover table-bordered mb-0">
                <thead class="table-light">
                    <tr>
                        <th th:text="${type == 'month'} ? 'Tháng' : 'Ngày'">Ngày</th>
                        <th class="text-center">Số đơn</th>
                        <th class="text-end">Doanh thu</th>
                        <th class="text-end">Giảm giá</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- row[0]=label, row[1]=totalBookings, row[2]=totalRevenue, row[3]=totalDiscount -->
                    <tr th:each="row : ${revenueList}">
                        <td th:text="${row[0]}"></td>
                        <td class="text-center" th:text="${row[1]}"></td>
                        <td class="text-end text-success fw-semibold"
                            th:text="${#numbers.formatDecimal(row[2], 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                        </td>
                        <td class="text-end text-danger"
                            th:text="${#numbers.formatDecimal(row[3], 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(revenueList)}">
                        <td colspan="4" class="text-center text-muted py-3">Không có dữ liệu</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- Chart.js -->
<script th:inline="javascript">
    const labels = /*[[${chartLabels}]]*/ '';
    const values = /*[[${chartValues}]]*/ '';

    new Chart(document.getElementById('revenueChart'), {
        type: 'bar',
        data: {
            labels: labels ? labels.split(',').map(l => l.replace(/"/g, '')) : [],
            datasets: [{
                label: 'Doanh thu (₫)',
                data: values ? values.split(',').map(Number) : [],
                backgroundColor: 'rgba(25, 135, 84, 0.6)',
                borderColor: 'rgba(25, 135, 84, 1)',
                borderWidth: 1,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => ctx.parsed.y.toLocaleString('vi-VN') + ' ₫'
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: val => val.toLocaleString('vi-VN') + ' ₫'
                    }
                }
            }
        }
    });
</script>

</body>
</html>
