<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Quản lý người dùng</h3>
        <a href="/admin/users/add" class="btn btn-primary">+ Thêm người dùng</a>
    </div>

    <!-- Search -->
    <form class="mb-3" action="/admin/users/search" method="get">
        <div class="input-group">
            <input type="text" name="name" class="form-control" placeholder="Tìm theo tên...">
            <button class="btn btn-outline-secondary" type="submit">Tìm</button>
        </div>
    </form>

    <!-- Table -->
    <div class="card shadow">
        <div class="card-body">

            <table class="table table-hover align-middle text-center">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>SĐT</th>
                    <th>Role</th>
                    <th>Trạng thái</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.fullName}"></td>
                    <td th:text="${u.email}"></td>
                    <td th:text="${u.phone}"></td>

                    <!-- Role badge -->
                    <td>
                        <span th:switch="${u.role}">
                            <span th:case="'admin'" class="badge bg-danger">Admin</span>
                            <span th:case="'staff'" class="badge bg-warning text-dark">Staff</span>
                            <span th:case="*" class="badge bg-secondary">Customer</span>
                        </span>
                    </td>

                    <!-- Status -->
                    <td>
                        <span th:if="${u.isActive}" class="badge bg-success">Hoạt động</span>
                        <span th:unless="${u.isActive}" class="badge bg-danger">Khóa</span>
                    </td>

                    <!-- Actions -->
                    <td>
                        <a th:href="@{'/admin/users/edit/' + ${u.id}}"
                           class="btn btn-sm btn-warning">Sửa</a>

                        <a th:href="@{'/admin/users/delete/' + ${u.id}}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('Xoá user này?')">Xoá</a>
                    </td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
